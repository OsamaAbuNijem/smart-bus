# nginx config for single-domain TilmezBus deployment.
# Mounted into the nginx container at /etc/nginx/conf.d/default.conf
#
# tilmezbus.com is the apex; www.tilmezbus.com 301-redirects to it.
# Path layout:
#   /api/v1/...         -> api  (mobile app + admin proxy)
#   /hubs/...           -> api  (SignalR)
#   /hangfire           -> api  (IP-allowlisted)
#   /health             -> api  (uptime checks)
#   everything else     -> web  (public landing + admin + SuperAdmin)

# ───── HTTP → HTTPS redirect (apex + www) ──────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name tilmezbus.com www.tilmezbus.com;

    # Let's Encrypt webroot challenge for renewals.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://tilmezbus.com$request_uri;
    }
}

# ───── www.tilmezbus.com → tilmezbus.com (over TLS) ────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.tilmezbus.com;

    ssl_certificate     /etc/letsencrypt/live/tilmezbus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tilmezbus.com/privkey.pem;

    return 301 https://tilmezbus.com$request_uri;
}

# ───── tilmezbus.com (apex) ────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tilmezbus.com;

    ssl_certificate     /etc/letsencrypt/live/tilmezbus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tilmezbus.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Student photos / absence attachments etc.
    client_max_body_size 20m;

    # ── SignalR hub: needs WebSocket upgrade + long-lived connections ──
    location /hubs/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Hangfire dashboard: IP-allowlisted ─────────────────────────────
    # Replace 1.2.3.4 with your office / home WAN IP (`curl ifconfig.me`).
    location /hangfire {
        allow 1.2.3.4;
        deny  all;
        proxy_pass         http://api:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API: /api/v1/* and /health go to the API container ─────────────
    # The Web project has its own /api/translations and /api-proxy routes
    # that must NOT match here, so we anchor on /api/v1/ exactly.
    location /api/v1/ {
        proxy_pass         http://api:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass         http://api:8080/health;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Everything else: Web (landing page, admin, SuperAdmin) ─────────
    location / {
        proxy_pass         http://web:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
