# nginx config for api.tilmezbus.com + admin.tilmezbus.com
# Mounted into the nginx container at /etc/nginx/conf.d/default.conf

# ───── HTTP → HTTPS redirect (both subdomains) ─────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.tilmezbus.com admin.tilmezbus.com;

    # Let's Encrypt webroot challenge — served over HTTP so certbot can renew.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ───── api.tilmezbus.com ────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.tilmezbus.com;

    ssl_certificate     /etc/letsencrypt/live/api.tilmezbus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tilmezbus.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Upload size for absence-request attachments / student photos etc.
    client_max_body_size 20m;

    # ── SignalR hub: needs upgrade headers + long-lived connections ────
    location /hubs/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Hangfire dashboard: IP-allowlisted ─────────────────────────────
    # Replace 1.2.3.4 with your office / home WAN IP (find via `curl ifconfig.me`).
    location /hangfire {
        allow 1.2.3.4;
        deny  all;
        proxy_pass         http://api:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Everything else: REST API ──────────────────────────────────────
    location / {
        proxy_pass         http://api:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ───── admin.tilmezbus.com ──────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.tilmezbus.com;

    ssl_certificate     /etc/letsencrypt/live/admin.tilmezbus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.tilmezbus.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://web:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
