# Hetzner CPX31 deployment for TilmezBus.
# Run from the repo root:  docker compose -f deploy/hetzner/docker-compose.yml up -d --build
#
# Every secret is sourced from .env (see .env.example). nginx terminates TLS
# and proxies api.tilmezbus.com -> api:8080 and admin.tilmezbus.com -> web:8080.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      # Web UI is behind nginx auth; admin sets a password on first visit.
    volumes:
      - seqdata:/data
    # NOT exposed publicly. Reach it through `ssh -L 5341:localhost:5341 ...`.

  api:
    build:
      context: ../..               # repo root
      dockerfile: deploy/hetzner/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      Jwt__Key:     ${JWT_KEY}
      Jwt__Issuer:  "TilmezBus.API"
      Jwt__Audience: "TilmezBus.Clients"
      # Single-domain layout: the admin UI, public site, and API all sit on
      # https://${DOMAIN}. Mobile clients are same-origin too. CORS still
      # has to include the apex because the admin's /api-proxy hits the API.
      AllowedOrigins__0: "https://${DOMAIN}"
      AllowedOrigins__1: "https://www.${DOMAIN}"
      Seq__ServerUrl: "http://seq:5341"
      Firebase__CredentialsJson: ${FIREBASE_CREDENTIALS_JSON}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health > /dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s

  web:
    build:
      context: ../..
      dockerfile: deploy/hetzner/Dockerfile.web
    restart: unless-stopped
    depends_on:
      api: { condition: service_started }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ApiBaseUrl: "http://api:8080/"
      Seq__ServerUrl: "http://seq:5341"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      api: { condition: service_started }
      web: { condition: service_started }
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/tilmezbus.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro      # certs issued on host by certbot
      - /var/www/certbot:/var/www/certbot:ro      # ACME challenge webroot

volumes:
  pgdata:
  redisdata:
  seqdata:
