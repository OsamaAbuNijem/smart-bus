# Hetzner CPX31 deployment for TilmezBus.
# Run from the repo root:  docker compose -f deploy/hetzner/docker-compose.yml up -d --build
#
# Every secret is sourced from .env (see .env.example). nginx terminates TLS
# and proxies api.tilmezbus.com -> api:8080 and admin.tilmezbus.com -> web:8080.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      # Newer Seq versions require an admin password on first boot.
      # Set SEQ_ADMIN_PASSWORD in .env (any strong string).
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD}
    volumes:
      - seqdata:/data
    # NOT exposed publicly on the public network. The override binds
    # 127.0.0.1:8341 on the host so an SSH tunnel can reach the UI.

  api:
    build:
      context: ../..               # repo root
      dockerfile: deploy/hetzner/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      Jwt__Key:     ${JWT_KEY}
      Jwt__Issuer:  "TilmezBus.API"
      Jwt__Audience: "TilmezBus.Clients"
      # Single-domain layout: the admin UI, public site, and API all sit on
      # https://${DOMAIN}. Mobile clients are same-origin too. CORS still
      # has to include the apex because the admin's /api-proxy hits the API.
      AllowedOrigins__0: "https://${DOMAIN}"
      AllowedOrigins__1: "https://www.${DOMAIN}"
      Seq__ServerUrl: "http://seq:5341"
      Firebase__CredentialsJson: ${FIREBASE_CREDENTIALS_JSON}
      # Twilio Verify v2 — OTP delivery and check. Leave VerifySid blank
      # to fall back to the dev-mode console logger (master code 1234).
      Twilio__AccountSid: ${TWILIO_ACCOUNT_SID}
      Twilio__AuthToken:  ${TWILIO_AUTH_TOKEN}
      Twilio__VerifySid:  ${TWILIO_VERIFY_SID}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health > /dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s

  web:
    build:
      context: ../..
      dockerfile: deploy/hetzner/Dockerfile.web
    restart: unless-stopped
    depends_on:
      api: { condition: service_started }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ApiBaseUrl: "http://api:8080/"
      Seq__ServerUrl: "http://seq:5341"
    volumes:
      - webkeys:/keys

  # ── OSRM routing ──────────────────────────────────────────────────────
  # One-shot preprocessor: downloads the Jordan OSM extract (~50 MB) on
  # first run, then produces the .osrm, .osrm.mldgr, .osrm.partition,
  # .osrm.cell files (~250 MB). Idempotent — subsequent boots see the
  # files and exit immediately, so `up -d` is cheap. To pull a fresh
  # snapshot of the map data, delete `jordan-latest.osm.pbf` from the
  # osrmdata volume and run `up -d osrm-init` again.
  osrm-init:
    image: ghcr.io/project-osrm/osrm-backend:latest
    restart: "no"
    volumes:
      - osrmdata:/data
    entrypoint:
      - sh
      - -c
      - |
        set -e
        cd /data
        if [ ! -f jordan-latest.osm.pbf ]; then
          echo "Downloading Jordan OSM extract..."
          wget -q -O jordan-latest.osm.pbf http://download.geofabrik.de/asia/jordan-latest.osm.pbf
        fi
        if [ ! -f jordan-latest.osrm.mldgr ]; then
          echo "Preprocessing (extract → partition → customize)..."
          osrm-extract -p /opt/car.lua jordan-latest.osm.pbf
          osrm-partition jordan-latest.osrm
          osrm-customize jordan-latest.osrm
        fi
        echo "OSRM data ready."

  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    restart: unless-stopped
    depends_on:
      osrm-init:
        condition: service_completed_successfully
    command:
      - osrm-routed
      - --algorithm
      - mld
      - --max-table-size
      - "1000"
      - /data/jordan-latest.osrm
    volumes:
      - osrmdata:/data
    # Internal-only — nginx proxies /route/v1/ to osrm:5000.

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      api:  { condition: service_started }
      web:  { condition: service_started }
      osrm: { condition: service_started }
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/tilmezbus.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro      # certs issued on host by certbot
      - /var/www/certbot:/var/www/certbot:ro      # ACME challenge webroot

volumes:
  pgdata:
  redisdata:
  seqdata:
  osrmdata:
  webkeys:
