name: smart_bus
description: "SmartBus mobile companion app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Routing
  go_router: ^14.6.2

  # Storage
  flutter_secure_storage: ^9.2.2

  # Models / serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # i18n / formatting
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3

  # Lint helpers
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  generate: true
