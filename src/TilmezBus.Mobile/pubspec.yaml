name: tilmez_bus
description: "TilmezBus mobile companion app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Routing
  go_router: ^14.6.2

  # Storage
  flutter_secure_storage: ^9.2.2

  # External actions (tel:, sms:)
  url_launcher: ^6.3.1

  # Device GPS (used to record student home pickup point on Morning trips)
  geolocator: ^13.0.4

  # Map (OpenStreetMap)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Real-time (SignalR)
  signalr_netcore: ^1.4.4

  # Push notifications (Firebase Cloud Messaging)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1

  # Models / serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # i18n / formatting
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3

  # Lint helpers
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
